<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Python automation</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body style="width: auto;">
        <style>
            @media screen and (max-width:950) {
                body div div {
                    overflow: hidden;
                    width: auto;
                }
            }
            {{customStyles}}
        </style>
        <!-- show two grabbed pages side by side-->
        <div style="display:flex; flex-direction: row;">
            <div style="padding: 1.5vw; border: 5px solid black; width: 50vw; overflow-x: hidden; box-sizing: border-box; overflow:scroll">
                {{page1}}
            </div>
            <div style="padding: 1.5vw; border: 5px solid black; width: 50vw; overflow-x: hidden; box-sizing: border-box; overflow:scroll">
                {{page2}}
            </div>
        </div>
    </body>
</html>
